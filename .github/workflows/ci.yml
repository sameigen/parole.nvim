name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: stevearc/nvim-typecheck-action@v2
        with:
          path: lua
          level: Error

  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rev: stable }
          - { os: ubuntu-latest, rev: nightly }
          - { os: macos-latest, rev: stable }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.rev }}
      - name: smoke (modules load, config + validation, diff mapping)
        run: nvim --headless --clean --cmd "set rtp+=." -l scripts/smoke.lua
